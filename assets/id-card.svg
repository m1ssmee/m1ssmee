<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 500 640" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="strap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef0f2"/>
      <stop offset="0.5" stop-color="#c3c7cc"/>
      <stop offset="1" stop-color="#9aa0a6"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6e27a"/>
      <stop offset="0.5" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#b8860b"/>
    </linearGradient>
    <!-- shifting holographic sticker -->
    <linearGradient id="holo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.33" stop-color="#22d3ee"/>
      <stop offset="0.66" stop-color="#27c93f"/>
      <stop offset="1" stop-color="#7c3aed"/>
      <animate attributeName="x1" values="-1;1" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;2" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    <clipPath id="cardclip"><rect x="108" y="192" width="284" height="400" rx="18"/></clipPath>
    <clipPath id="photoclip"><rect x="126" y="276" width="104" height="126" rx="10"/></clipPath>
    <pattern id="bars" width="11" height="34" patternUnits="userSpaceOnUse">
      <rect width="11" height="34" fill="#f6f7f9"/>
      <rect x="0" width="2" height="34" fill="#111"/>
      <rect x="4" width="1" height="34" fill="#111"/>
      <rect x="7" width="3" height="34" fill="#111"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-20%" width="160%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- fixed ceiling hook (does NOT swing) -->
  <rect x="234" y="6" width="32" height="9" rx="3" fill="#484f58"/>
  <circle cx="250" cy="24" r="9" fill="none" stroke="#9aa0a6" stroke-width="4"/>

  <!-- everything below swings from the hook -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      values="-2.6 250 24; 2.6 250 24; -2.6 250 24" dur="5s"
      calcMode="spline" keyTimes="0;0.5;1"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite"/>

    <!-- lanyard straps -->
    <path d="M250 28 L214 178" stroke="url(#strap)" stroke-width="15" stroke-linecap="round"/>
    <path d="M250 28 L286 178" stroke="url(#strap)" stroke-width="15" stroke-linecap="round"/>
    <path d="M250 30 L216 176" stroke="#22d3ee" stroke-width="2.5" opacity="0.6"/>
    <path d="M250 30 L284 176" stroke="#22d3ee" stroke-width="2.5" opacity="0.6"/>

    <!-- metal clip -->
    <rect x="214" y="178" width="72" height="18" rx="5" fill="url(#silver)" stroke="#8b9096"/>
    <rect x="230" y="160" width="40" height="22" rx="5" fill="url(#silver)" stroke="#8b9096"/>
    <circle cx="250" cy="171" r="4" fill="#0d1117"/>

    <!-- CARD -->
    <rect x="108" y="192" width="284" height="400" rx="18" fill="#f6f7f9" stroke="#d0d3d8" filter="url(#shadow)"/>

    <!-- header band -->
    <rect x="108" y="192" width="284" height="58" fill="url(#band)" clip-path="url(#cardclip)"/>
    <rect x="108" y="249" width="284" height="2" fill="#22d3ee" clip-path="url(#cardclip)"/>
    <!-- logo mark -->
    <g stroke="#ffffff" stroke-width="1.4">
      <line x1="128" y1="215" x2="140" y2="223"/>
      <line x1="128" y1="231" x2="140" y2="223"/>
      <line x1="128" y1="215" x2="128" y2="231"/>
    </g>
    <circle cx="128" cy="215" r="3" fill="#22d3ee"/>
    <circle cx="128" cy="231" r="3" fill="#ffffff"/>
    <circle cx="140" cy="223" r="3.5" fill="#22d3ee"/>
    <text x="152" y="219" fill="#ffffff" font-size="13" font-weight="700" letter-spacing="1.5">AI · ML DIVISION</text>
    <text x="152" y="234" fill="#c7d2fe" font-size="9" letter-spacing="1">STAFF IDENTIFICATION</text>
    <!-- status LED -->
    <circle cx="330" cy="220" r="4.5" fill="#27c93f">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="340" y="224" fill="#d1fadf" font-size="9" font-weight="700">ACTIVE</text>

    <!-- photo -->
    <g clip-path="url(#photoclip)">
      <rect x="126" y="276" width="104" height="126" fill="#eceef1"/>
      <text x="178" y="343" fill="#b6bbc2" font-size="10" letter-spacing="2" text-anchor="middle">PHOTO</text>
    </g>
    <rect x="126" y="276" width="104" height="126" rx="10" fill="none" stroke="#7c3aed" stroke-width="1.5"/>

    <!-- fields -->
    <text x="248" y="292" fill="#8b929c" font-size="9" letter-spacing="1">ID NO.</text>
    <text x="248" y="307" fill="#1b1f24" font-size="13" font-weight="700" font-family="monospace">AI-2027-1F</text>
    <text x="248" y="325" fill="#8b929c" font-size="9" letter-spacing="1">DEPARTMENT</text>
    <text x="248" y="340" fill="#1b1f24" font-size="13" font-weight="700">GenAI · LLM</text>
    <text x="248" y="358" fill="#8b929c" font-size="9" letter-spacing="1">LOCATION</text>
    <text x="248" y="373" fill="#1b1f24" font-size="13" font-weight="700">Gurugram, IN</text>
    <text x="248" y="391" fill="#8b929c" font-size="9" letter-spacing="1">MEMBER SINCE</text>
    <text x="248" y="406" fill="#1b1f24" font-size="13" font-weight="700">2023</text>

    <!-- name + role -->
    <text x="126" y="440" fill="#12151a" font-size="23" font-weight="800" letter-spacing="0.5">KRISH PANDIT</text>
    <text x="126" y="459" fill="#6d28d9" font-size="13" font-weight="700" letter-spacing="0.5">AI / ML Engineer</text>
    <line x1="126" y1="470" x2="374" y2="470" stroke="#e1e4e8" stroke-width="1.5"/>

    <!-- chip -->
    <rect x="126" y="480" width="46" height="34" rx="5" fill="url(#gold)" stroke="#a67c00"/>
    <g stroke="#8a6d00" stroke-width="1" opacity="0.7">
      <line x1="149" y1="480" x2="149" y2="514"/>
      <line x1="126" y1="491" x2="172" y2="491"/>
      <line x1="126" y1="503" x2="172" y2="503"/>
    </g>

    <!-- signature -->
    <text x="192" y="504" fill="#2b2f36" font-size="22" font-style="italic" font-family="'Segoe Script','Brush Script MT',cursive">Krish</text>
    <line x1="188" y1="510" x2="300" y2="510" stroke="#c3c7cc" stroke-width="1"/>
    <text x="188" y="522" fill="#9aa0a6" font-size="8" letter-spacing="1">AUTHORIZED SIGNATURE</text>

    <!-- hologram sticker -->
    <rect x="312" y="478" width="62" height="38" rx="8" fill="url(#holo)" opacity="0.9"/>
    <text x="343" y="502" fill="#0d1117" font-size="14" font-weight="800" text-anchor="middle">AI</text>

    <!-- barcode -->
    <rect x="126" y="528" width="248" height="34" fill="url(#bars)"/>
    <text x="250" y="578" fill="#3a3f46" font-size="10" font-family="monospace" letter-spacing="2" text-anchor="middle">M1SSMEE · KRISH-PANDIT-2027</text>
  </g>
</svg>
